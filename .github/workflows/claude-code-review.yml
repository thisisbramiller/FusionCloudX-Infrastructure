name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"

jobs:
  claude-review:
    runs-on: ubuntu-latest

    # Posting goes through the Claude GitHub App installation token, but GitHub caps
    # that token to the INTERSECTION of the App's granted perms AND this block. With
    # read-only here, the App token is downscoped to read, so every comment write 403s
    # -- and the action swallows the 403 and exits 0, giving a green run with an empty
    # PR. (anthropics/claude-code-action #1121.) The App install itself is fine; this
    # block is the ceiling that has to allow writes.
    permissions:
      contents: read
      pull-requests: write   # was: read -- required to post the review + inline comments
      issues: write          # was: read -- `gh pr comment` posts top-level comments via the Issues API
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5   # was @v4 (Node 20 runtime deprecation)
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          # --comment is MANDATORY. The code-review plugin command (step 7) explicitly
          # says: if --comment is NOT provided, stop here and post nothing. Its absence
          # -- not permissions -- was the dominant cause of the green-but-empty reviews.
          # (anthropics/claude-code-action #1087.)
          prompt: '/code-review:code-review --comment ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          # Consolidate review feedback into one PR comment -- the canonical input for
          # pull_request-triggered reviews (docs/usage.md). NOTE: do NOT add a custom
          # --allowed-tools here; it replaces the allowlist and would strip the plugin's
          # own Read/Grep/review tools.
          use_sticky_comment: true
          # IMPORTANT: claude-code-action only runs once this workflow matches the copy on
          # the DEFAULT BRANCH (App-token validation). Changes take effect after merge to
          # main, NOT on the PR that introduces them -- the PR's own review check will fail
          # validation, which is expected.
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
