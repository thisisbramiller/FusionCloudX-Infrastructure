name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"

jobs:
  claude-review:
    runs-on: ubuntu-latest

    # Posting goes through the Claude GitHub App installation token, but GitHub caps
    # that token to the INTERSECTION of the App's granted perms AND this block. With
    # read-only here, the App token is downscoped to read, so every comment write 403s
    # -- and the action swallows the 403 and exits 0, giving a green run with an empty
    # PR. (anthropics/claude-code-action #1121.) The App install itself is fine; this
    # block is the ceiling that has to allow writes.
    permissions:
      contents: read
      pull-requests: write   # was: read -- required to post the review + inline comments
      issues: write          # was: read -- `gh pr comment` posts top-level comments via the Issues API
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5   # was @v4 (Node 20 runtime deprecation)
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          # --comment is MANDATORY. The code-review plugin command (step 7) explicitly
          # says: if --comment is NOT provided, stop here and post nothing. Its absence
          # -- not permissions -- was the dominant cause of the green-but-empty reviews.
          # (anthropics/claude-code-action #1087.)
          prompt: '/code-review:code-review --comment ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          # Also publish a tracking/result comment -- guards against the empty-result
          # (orphaned-TodoWrite) path seen in #1087.
          track_progress: true
          # Allow the plugin's posting tools so the SDK sandbox doesn't deny gh / inline comments.
          claude_args: |
            --allowed-tools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*),Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*)"
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
