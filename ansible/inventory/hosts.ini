# ==============================================================================
# Ansible Inventory - FusionCloudX Infrastructure
# ==============================================================================
# This inventory is managed semi-automatically:
# - Run the update-inventory script to populate IP from Terraform outputs
# - Manual edits are preserved in the [group:vars] and host_vars files
# ==============================================================================

# ==============================================================================
# Control Plane Servers
# ==============================================================================

# Semaphore UI - Infrastructure Orchestration Control Plane
[semaphore]
semaphore-ui ansible_host=192.168.40.133

[semaphore:vars]
ansible_user=ansible
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

# GitLab - Development Platform and CI/CD Control Plane
[gitlab]
gitlab ansible_host=192.168.40.231

[gitlab:vars]
ansible_user=ansible
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

# PostgreSQL Database Server
# Single container hosting multiple databases (semaphore, wazuh, gitlabhq_production)
[postgresql]
postgresql ansible_host=postgresql

[postgresql:vars]
ansible_user=root
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

# ==============================================================================
# Application Servers (for future expansion)
# ==============================================================================

[application_servers]
# wazuh ansible_host=192.168.1.XXX
# teleport ansible_host=192.168.1.XXX
# immich ansible_host=192.168.1.XXX

[monitoring]
# Monitoring servers

[monitoring]
# Monitoring servers
# wazuh ansible_host=192.168.1.XXX

# ==============================================================================
# Meta Groups
# ==============================================================================

[control_plane:children]
semaphore
gitlab

[homelab:children]
control_plane
postgresql
application_servers
monitoring

[homelab:vars]
# Global variables for entire homelab
ansible_connection=ssh

