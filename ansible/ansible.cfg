# ==============================================================================
# Ansible Configuration for FusionCloudX Infrastructure
# ==============================================================================
# This configuration is optimized for homelab use with security best practices
# ==============================================================================

[defaults]

# Inventory - Dynamic inventory via Proxmox API
# Uses directory to merge multiple sources (proxmox.yml + any static hosts)
inventory = ./inventory/
# Homelab convenience - containers get recreated often (own line; inline '#'
# comments are not stripped and would corrupt the value).
host_key_checking = False

# Performance
forks = 10
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_facts
fact_caching_timeout = 3600

# Output
stdout_callback = default
bin_ansible_callbacks = True

# Security
retry_files_enabled = False
# vault_password_file = ./.vault_pass  # Commented out - using 1Password Connect instead

# SSH
# IMPORTANT: ansible's configparser does NOT strip inline '#' comments, so a
# trailing comment becomes part of the value. "remote_user = root  # ..." made
# the literal SSH username "root  # LXC..." on a delegated task. Keep every value
# comment-free; put comments on their own lines.
# LXC containers default to root access; VMs also use root via the cloud-init key.
remote_user = root
remote_port = 22
# Bumped 10 -> 30: sudo privilege-escalation on freshly-booted VMs under the
# parallel cert play intermittently exceeded a 10s timeout -> sporadic UNREACHABLE.
timeout = 30
# pipelining is configured authoritatively in [ssh_connection] (every connection
# here is SSH); a [defaults] duplicate would be redundant.

# Privilege Escalation
# We're already root in LXC containers
become = False
become_method = sudo
become_ask_pass = False

# Roles
roles_path = ./roles

# Collections
collections_paths = ~/.ansible/collections:/usr/share/ansible/collections

# Logging (optional - uncomment to enable)
# log_path = ./ansible.log

# Use YAML format for default callback (ansible-core 2.13+)
[callback_default]
result_format = yaml

[inventory]
# Enable Terraform state dynamic inventory plugin
enable_plugins = cloud.terraform.terraform_provider, ini, yaml, host_list
# Cache inventory for performance (optional)
cache = true
cache_plugin = jsonfile
cache_timeout = 300
cache_connection = /tmp/ansible_inventory_cache

[privilege_escalation]
become = False

[ssh_connection]
# IdentitiesOnly=yes: the 1Password SSH agent holds several keys; without this, ssh offers
# them all and trips the freshly-cloned hosts' MaxAuthTries ("Too many authentication
# failures") before the cloud-init key. Forces ssh to use ONLY ansible_ssh_private_key_file
# (/tmp/.ansible_ssh_key, loaded by the ssh-key-loader role from 1Password Connect).
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no -o IdentitiesOnly=yes
pipelining = True
