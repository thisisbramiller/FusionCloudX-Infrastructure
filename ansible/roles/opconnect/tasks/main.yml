---
# ==============================================================================
# opconnect Role - Main Tasks
# ==============================================================================
# Deploys 1Password Connect (connect-api + connect-sync) via Docker Compose on
# the opconnect VM. Docker CE + the Compose plugin are installed by the shared
# `docker` role (pulled in via meta/main.yml).
#
# SECRETS-ROOT BOOTSTRAP PATH. Unlike the app roles (mealie/tandoor/immich),
# this role does NOT read 1Password via Connect — it BUILDS Connect. The two
# artifacts Connect needs are generated OUT-OF-BAND at P4 using the Service
# Account token (NOT Connect):
#     op connect server create opconnect     # -> 1password-credentials.json
#     op connect token create  opconnect ... # -> the Connect access token
# 1password-credentials.json is available on the ANSIBLE CONTROLLER at
# `opconnect_credentials_local`; the role copies it to the VM (no manual scp).
# The Connect access token is consumed by
# DOWNSTREAM repointing (OP_CONNECT_TOKEN), not by Connect itself, so it is not
# handled here. See the P4 cutover note in tofu/opconnect/opconnect.tf.
# ==============================================================================

- name: Create opconnect compose directory
  ansible.builtin.file:
    path: "{{ opconnect_compose_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0750'
  tags: ['opconnect', 'deploy']

# The 1password-credentials.json is generated out-of-band by the operator
# (`op connect server create`, P4.1). Ansible COPIES it from the controller
# (opconnect_credentials_local) into the compose dir on the VM — NO manual scp,
# the same way every other role places files. (copy, NOT remote_src: src is on
# the controller.) The compose file's relative `./1password-credentials.json`
# mount expects it at this dest.
- name: Stage 1Password Connect credentials into the compose directory
  ansible.builtin.copy:
    src: "{{ opconnect_credentials_local }}"
    dest: "{{ opconnect_compose_dir }}/1password-credentials.json"
    # Owned by the container's opuser (UID 999), NOT root: connect-sync runs as
    # opuser and reads this :ro-mounted file. root:root 0600 -> "permission
    # denied" -> sync never initializes. 0600 keeps it owner-only (not world).
    owner: "{{ opconnect_container_uid }}"
    group: "{{ opconnect_container_uid }}"
    mode: '0600'
  no_log: true
  notify: restart opconnect
  tags: ['opconnect', 'deploy', 'secrets']

- name: Assert staged credentials file is present and non-empty
  ansible.builtin.stat:
    path: "{{ opconnect_compose_dir }}/1password-credentials.json"
  register: _opconnect_creds_stat
  tags: ['opconnect', 'deploy', 'secrets']

- name: Fail fast if the credentials file is missing or empty
  ansible.builtin.fail:
    msg: >-
      {{ opconnect_compose_dir }}/1password-credentials.json is missing or empty.
      The controller-side source ({{ opconnect_credentials_local }}) must be the
      non-empty file emitted by `op connect server create` (P4.1) — the relative
      ./ bind in docker-compose would otherwise create an empty mount and
      connect-sync cannot authenticate.
  when: not _opconnect_creds_stat.stat.exists or _opconnect_creds_stat.stat.size == 0
  tags: ['opconnect', 'deploy', 'secrets']

- name: Template Docker Compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ opconnect_compose_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: '0640'
  notify: restart opconnect
  tags: ['opconnect', 'deploy']

- name: Restart containers if configuration changed
  ansible.builtin.meta: flush_handlers

- name: Start 1Password Connect containers
  community.docker.docker_compose_v2:
    project_src: "{{ opconnect_compose_dir }}"
    state: present
    pull: always
  tags: ['opconnect', 'deploy']

# /heartbeat is the connect-api unauthenticated liveness endpoint — returns
# HTTP 200 + a plain "." when the API server is up (vs /health, which returns a
# fuller dependency object only once connect-sync has reached 1password.com).
# Source: https://www.1password.dev/connect/api-reference/ (Health & Heartbeat).
- name: Wait for 1Password Connect API to be ready
  ansible.builtin.uri:
    url: "http://localhost:{{ opconnect_api_port }}/heartbeat"
    status_code: 200
  register: opconnect_health
  retries: 30
  delay: 5
  until: opconnect_health is succeeded
  tags: ['opconnect', 'verify']

# /health (unauthenticated) returns {name, version, dependencies[]}. On a fresh
# server BEFORE the first authenticated request, the `sync` dependency reports
# TOKEN_NEEDED (expected — primed by the authenticated /v1 read in the runbook,
# NOT here). The role gate asserts ONLY: api live (/heartbeat, above), the
# pinned version deployed, and the local store (sqlite) is ACTIVE.
- name: Fetch 1Password Connect /health
  ansible.builtin.uri:
    url: "http://localhost:{{ opconnect_api_port }}/health"
    return_content: true
    status_code: 200
  register: _opconnect_healthz
  retries: 12
  delay: 5
  until: _opconnect_healthz is succeeded
  tags: ['opconnect', 'verify']

- name: Assert deployed version matches the pinned tag and sqlite is ACTIVE
  ansible.builtin.assert:
    that:
      - _opconnect_healthz.json.version == opconnect_connect_version
      - >-
        (_opconnect_healthz.json.dependencies
         | selectattr('service', 'equalto', 'sqlite') | map(attribute='status') | first | default('')) == 'ACTIVE'
    fail_msg: >-
      /health did not confirm a clean deploy. version_seen={{ _opconnect_healthz.json.version | default('?') }}
      expected={{ opconnect_connect_version }}; dependencies={{ _opconnect_healthz.json.dependencies | default([]) }}.
      (sync=TOKEN_NEEDED here is EXPECTED — primed by the authenticated /v1 read in P4.3.)
    success_msg: "Connect {{ _opconnect_healthz.json.version }} live; sqlite ACTIVE; sync primes on the P4.3 authenticated read."
  tags: ['opconnect', 'verify']

- name: Display opconnect deployment status
  ansible.builtin.debug:
    msg:
      - "========================================"
      - "1Password Connect deployment complete!"
      - "========================================"
      - "API:  http://{{ ansible_host }}:{{ opconnect_api_port }}"
      - "Repoint downstream OP_CONNECT_HOST -> http://opconnect.fusioncloudx.home:{{ opconnect_api_port }} (P4 cutover, after verifying a test secret)"
      - "========================================"
  tags: ['opconnect']
