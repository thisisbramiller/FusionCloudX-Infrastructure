---
# ==============================================================================
# opconnect Role - Default Variables
# ==============================================================================

# 1Password Connect image versions (pinned for deliberate upgrades). connect-api
# and connect-sync are released as a matched pair — keep both on the same tag.
# Override in host_vars/group_vars when bumping. (Upstream's published example
# uses :latest; we pin instead.)
opconnect_connect_version: "1.7.3"
opconnect_connect_api_image: "1password/connect-api"
opconnect_connect_sync_image: "1password/connect-sync"

# Docker Compose project directory (the compose dir holds docker-compose.yml +
# the 1password-credentials.json the API/sync containers mount).
opconnect_compose_dir: "/opt/opconnect"

# Published connect-api port (the official Connect compose publishes the REST
# API on 8080). connect-sync's :8080 is mapped to a different host port to avoid
# a collision; it is an internal sync service and need not be reachable on 8080.
opconnect_api_port: 8080
opconnect_sync_port: 8081

# Connect log level (passed through OP_LOG_LEVEL). info|debug|trace.
opconnect_log_level: "info"

# Path ON THE ANSIBLE CONTROLLER to the 1password-credentials.json (the consume/
# deploy source for the live VM). Ansible COPIES it to the compose dir on the VM
# (copy, NOT remote_src). Phase C sources this from the AWS bundle instead of a
# local path; until then this local path is the fallback.
#
# Division of responsibility (deliberate): the Connect SERVER + TOKEN creation
# (`op connect server/token create`) is now CODIFIED in the `opconnect_credentials.yml`
# seed playbook (localhost, account-mode `op`, biometric via the unlocked 1Password
# desktop app) — NOT a manual ad-hoc step. It still CANNOT be a Service Account or
# an unattended CI runner (a Service Account gets 403 on token create; CI has no
# biometric). Ansible owns BOTH: seeding/rotating the off-site copy (seed.yml) and
# deploying the creds + reading day-2 secrets via Connect.
#
# Lift-and-shift note: when IaC moves to GitLab CI, only THIS source path changes
# (read from the AWS bundle instead of a local file); the copy mechanics are
# identical. Override with -e opconnect_credentials_local=<path>.
opconnect_credentials_local: "{{ lookup('env', 'HOME') }}/opconnect-cutover/1password-credentials.json"

# UID/GID of `opuser` inside the official 1password/connect-api|sync images. The
# credentials file is bind-mounted read-only and read by this non-root user — so
# it MUST be owned by (or readable by) this UID, NOT root:root. Confirmed
# empirically: the connect-sync data volume's sqlite is owned by 999:999. A
# root:root 0600 creds file yields connect-sync "permission denied ... open
# /home/opuser/.op/1password-credentials.json" and sync never initializes. We
# chown the staged file to this UID + keep 0600 (owner-readable by opuser, NOT
# world-readable). Override if a future image changes the UID.
opconnect_container_uid: 999

# (Off-site credentials bundle schema lives in the standalone `opconnect_credentials`
#  role's defaults — that role seeds/rotates tmpx/onprem/opconnect-credentials on
#  localhost WITHOUT this role's docker meta-dependency. See playbooks/opconnect_credentials.yml.)
