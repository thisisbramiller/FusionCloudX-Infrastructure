---
# ==============================================================================
# SSH Key Loader - Default Variables
# ==============================================================================

# Path to write the temporary SSH key file
ssh_key_loader_temp_path: "/tmp/.ansible_ssh_key"

# 1Password item details (PATH A — Connect, fleet)
ssh_key_loader_item_name: "Infrastructure Ansible SSH Key"
ssh_key_loader_section_name: "Private Key"
ssh_key_loader_field_name: "private_key"

# Source selector (Direction A, #68): 'connect' (FLEET default, PATH A — 1Password
# Connect) or 'aws_bundle' (opconnect bootstrap, PATH B — read the dedicated private
# key from the AWS Secrets Manager bundle). Set on the opconnect bootstrap play.
ssh_key_source: connect
