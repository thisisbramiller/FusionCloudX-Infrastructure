---
# ==============================================================================
# SSH Key Loader - Retrieve SSH Key from 1Password Connect
# ==============================================================================
# Retrieves the Ansible SSH private key from 1Password Connect and writes
# it to a temporary file for use with ansible_ssh_private_key_file.
#
# This role should be included at the start of playbooks that need SSH access.
# The cleanup tasks should be included at the end to remove the temp file.
#
# Clean-before-load: Any leftover SSH key from a previous failed run is
# removed before loading a fresh key (similar to 'mvn clean install').
#
# Requirements:
#   - TF_VAR_onepassword_vault_id environment variable set (BOTH paths)
#   PATH A — Connect (op_use_cli: false, fleet default):
#     - OP_CONNECT_HOST + OP_CONNECT_TOKEN environment variables set
#     - onepassword.connect collection installed
#   PATH B — op CLI (op_use_cli: true, Connect-less opconnect rebuild):
#     - `op` CLI on the controller, authed via `op signin` / 1Password desktop
#       (or OP_SERVICE_ACCOUNT_TOKEN). Connect vars NOT required.
# ==============================================================================

# --- Clean workspace before loading (removes any leftover from failed runs) ---
- name: Clean any existing SSH key from previous runs
  file:
    path: "{{ ssh_key_loader_temp_path }}"
    state: absent
  delegate_to: localhost
  become: false
  run_once: true
  tags: ['ssh-key', 'always']

# --- Load fresh SSH key ---
- name: Set 1Password Connect token variable
  set_fact:
    _op_connect_token: "{{ lookup('env', 'OP_CONNECT_TOKEN') }}"
  no_log: true
  run_once: true
  delegate_to: localhost
  tags: ['ssh-key', 'always']

- name: Set vault ID variable
  set_fact:
    _op_vault_id: "{{ lookup('env', 'TF_VAR_onepassword_vault_id') }}"
  run_once: true
  delegate_to: localhost
  tags: ['ssh-key', 'always']

- name: Retrieve Ansible SSH private key from 1Password Connect
  onepassword.connect.field_info:
    token: "{{ _op_connect_token }}"
    item: "{{ ssh_key_loader_item_name }}"
    field: "{{ ssh_key_loader_field_name }}"
    section: "{{ ssh_key_loader_section_name }}"
    vault: "{{ _op_vault_id }}"
  environment:
    OP_CONNECT_HOST: "{{ lookup('env', 'OP_CONNECT_HOST') }}"
  delegate_to: localhost
  become: false
  run_once: true
  no_log: true
  register: _ssh_key_result
  when: not (op_use_cli | default(false) | bool)
  tags: ['ssh-key', 'always']

- name: Retrieve Ansible SSH private key via op (1Password CLI / desktop)
  # `env -u` TRULY unsets OP_CONNECT_* for the op subprocess. Setting them to ""
  # via `environment:` leaves them SET-but-empty, which keeps op in Connect mode
  # (op then tries an empty-host Connect call: "unsupported protocol scheme").
  # Unset => op uses account/desktop (or OP_SERVICE_ACCOUNT_TOKEN) auth, reading
  # 1Password directly — the Connect-independent path.
  ansible.builtin.command:
    argv:
      - env
      - -u
      - OP_CONNECT_HOST
      - -u
      - OP_CONNECT_TOKEN
      - op
      - read
      - "op://{{ _op_vault_id }}/{{ ssh_key_loader_item_name }}/{{ ssh_key_loader_section_name }}/{{ ssh_key_loader_field_name }}"
  register: _ssh_key_op
  changed_when: false
  no_log: true
  delegate_to: localhost
  become: false
  run_once: true
  when: (op_use_cli | default(false) | bool) and (op_ssh_key_ref | default('') | length == 0)
  tags: ['ssh-key', 'always']

# Dedicated-key path (opconnect): when op_ssh_key_ref is a full op:// reference
# (carrying its own ?ssh-format=openssh query), `op read --out-file` writes the
# key STRAIGHT to the 0600 temp file — no stdout, no copy task. This sidesteps
# the item/section/field template and is mutually exclusive with the stdout-read
# + Write-copy tasks (their WHENs require op_ssh_key_ref to be empty).
- name: Retrieve SSH private key via op read --out-file (full reference)
  ansible.builtin.command:
    argv:
      - env
      - -u
      - OP_CONNECT_HOST
      - -u
      - OP_CONNECT_TOKEN
      - op
      - read
      - "--out-file"
      - "{{ ssh_key_loader_temp_path }}"
      - "--file-mode"
      - "0600"
      - "--force"
      - "{{ op_ssh_key_ref }}"
  delegate_to: localhost
  become: false
  run_once: true
  when: (op_use_cli | default(false) | bool) and (op_ssh_key_ref | default('') | length > 0)
  no_log: true
  tags: ['ssh-key', 'always']

- name: Write SSH key to secure temp file
  copy:
    # op path: `command.stdout` is right-stripped, but an OpenSSH private key MUST
    # end with a trailing newline or ssh rejects it ("invalid format") — re-add it.
    # Connect path: the field value already carries its trailing newline.
    content: "{{ (_ssh_key_op.stdout + '\n') if (op_use_cli | default(false) | bool) else _ssh_key_result.field.value }}"
    dest: "{{ ssh_key_loader_temp_path }}"
    mode: '0600'
  delegate_to: localhost
  become: false
  run_once: true
  no_log: true
  # Skipped on the dedicated-key path — `op read --out-file` already wrote the
  # file. Runs only when op_ssh_key_ref is empty (Connect path + op stdout path).
  when: (op_ssh_key_ref | default('') | length == 0)
  tags: ['ssh-key', 'always']

- name: Display SSH key load status
  debug:
    msg: "SSH key loaded via {{ (op_use_cli | default(false) | bool) | ternary('op CLI', '1Password Connect') }} to {{ ssh_key_loader_temp_path }}"
  run_once: true
  delegate_to: localhost
  tags: ['ssh-key', 'always']
