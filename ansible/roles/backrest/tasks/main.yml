---
# ==============================================================================
# Backrest Role - Main Tasks
# ==============================================================================
# Installs Docker, mounts NFS backup destination, deploys Backrest SSH key,
# and deploys Backrest via Docker Compose with nginx SSL termination.
# ==============================================================================

# ------------------------------------------------------------------------------
# Docker Installation
# ------------------------------------------------------------------------------

- name: Install Docker prerequisites
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: yes
  tags: ['backrest', 'docker']

- name: Add Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'
  tags: ['backrest', 'docker']

- name: Add Docker repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
    filename: docker
  tags: ['backrest', 'docker']

- name: Install Docker CE and Compose plugin
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: yes
  tags: ['backrest', 'docker']

- name: Ensure Docker service is started and enabled
  systemd:
    name: docker
    state: started
    enabled: yes
  tags: ['backrest', 'docker']

# ------------------------------------------------------------------------------
# NFS Client Installation
# ------------------------------------------------------------------------------

- name: Install NFS client
  apt:
    name:
      - nfs-common
    state: present
  tags: ['backrest', 'nfs']

# ------------------------------------------------------------------------------
# NFS Backup Destination (UNAS Pro)
# ------------------------------------------------------------------------------

- name: Mount NFS backup destination from UNAS Pro
  ansible.posix.mount:
    src: "{{ backrest_nfs_server }}:{{ backrest_nfs_export }}"
    path: "{{ backrest_backup_mount }}"
    fstype: nfs
    opts: "{{ backrest_nfs_mount_opts }}"
    state: mounted
  tags: ['backrest', 'nfs']

- name: Create restic repository directory
  file:
    path: "{{ backrest_repo_path }}"
    state: directory
    mode: '0750'
  tags: ['backrest', 'nfs']

# ------------------------------------------------------------------------------
# NFS Source Mounts (from source VMs)
# ------------------------------------------------------------------------------

- name: Create PostgreSQL dumps directory (SSH-piped, no NFS)
  file:
    path: "{{ backrest_pg_dumps_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0750'
  tags: ['backrest', 'nfs']

- name: Create source mount parent directory
  file:
    path: "{{ backrest_sources_dir }}"
    state: directory
    mode: '0755'
  tags: ['backrest', 'nfs']

- name: Create source mount point directories (skip if already mounted)
  file:
    path: "{{ item.path }}"
    state: directory
    mode: '0755'
  loop: "{{ backrest_source_mounts }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - backrest_source_mounts | length > 0
    - item.path not in ansible_mounts | map(attribute='mount') | list
  tags: ['backrest', 'nfs']

- name: Mount NFS source shares
  ansible.posix.mount:
    src: "{{ item.src }}"
    path: "{{ item.path }}"
    fstype: nfs
    opts: "{{ backrest_source_nfs_mount_opts }}"
    state: mounted
  loop: "{{ backrest_source_mounts }}"
  loop_control:
    label: "{{ item.name }}"
  when: backrest_source_mounts | length > 0
  tags: ['backrest', 'nfs']

# ------------------------------------------------------------------------------
# SSH Key for Pre-Backup Hooks
# ------------------------------------------------------------------------------

- name: Create Backrest SSH directory
  file:
    path: "{{ backrest_ssh_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0700'
  tags: ['backrest', 'ssh']

- name: Fetch Backrest SSH private key from 1Password
  onepassword.connect.field_info:
    token: "{{ lookup('env', 'OP_CONNECT_TOKEN') }}"
    item: "{{ backrest_ssh_key_item }}"
    field: "private_key"
    section: "Private Key"
    vault: "{{ lookup('env', 'TF_VAR_onepassword_vault_id') }}"
  environment:
    OP_CONNECT_HOST: "{{ lookup('env', 'OP_CONNECT_HOST') }}"
  delegate_to: localhost
  become: no
  no_log: true
  register: backrest_ssh_key_result
  tags: ['backrest', 'ssh', 'secrets']

- name: Deploy Backrest SSH private key
  copy:
    content: "{{ backrest_ssh_key_result.field.value }}"
    dest: "{{ backrest_ssh_dir }}/backrest_ed25519"
    owner: root
    group: root
    mode: '0600'
  no_log: true
  tags: ['backrest', 'ssh']

# ------------------------------------------------------------------------------
# Credentials from 1Password
# ------------------------------------------------------------------------------

- name: Fetch Backrest restic repository password from 1Password
  onepassword.connect.field_info:
    token: "{{ lookup('env', 'OP_CONNECT_TOKEN') }}"
    item: "{{ backrest_restic_password_item }}"
    field: "password"
    vault: "{{ lookup('env', 'TF_VAR_onepassword_vault_id') }}"
  environment:
    OP_CONNECT_HOST: "{{ lookup('env', 'OP_CONNECT_HOST') }}"
  delegate_to: localhost
  become: no
  no_log: true
  register: backrest_restic_password_result
  tags: ['backrest', 'secrets']

- name: Fetch Backrest web UI password from 1Password
  onepassword.connect.field_info:
    token: "{{ lookup('env', 'OP_CONNECT_TOKEN') }}"
    item: "{{ backrest_web_password_item }}"
    field: "password"
    vault: "{{ lookup('env', 'TF_VAR_onepassword_vault_id') }}"
  environment:
    OP_CONNECT_HOST: "{{ lookup('env', 'OP_CONNECT_HOST') }}"
  delegate_to: localhost
  become: no
  no_log: true
  register: backrest_web_password_result
  tags: ['backrest', 'secrets']

- name: Read existing config.json for bcrypt hash reuse
  slurp:
    src: "{{ backrest_config_dir }}/config.json"
  register: existing_config_raw
  failed_when: false
  no_log: true
  tags: ['backrest', 'secrets']

- name: Extract existing bcrypt hash from config.json
  set_fact:
    _existing_bcrypt: "{{ (existing_config_raw.content | b64decode | from_json).auth.users[0].passwordBcrypt }}"
  when: existing_config_raw.content is defined
  failed_when: false
  no_log: true
  tags: ['backrest', 'secrets']

- name: Generate Go-compatible bcrypt hash for web password
  command: >
    {{ ansible_playbook_python }} -c
    "import bcrypt, base64, sys;
    h = bcrypt.hashpw(sys.argv[1].encode(), bcrypt.gensalt(rounds=10));
    print(base64.b64encode(h).decode(), end='')"
    "{{ backrest_web_password_result.field.value }}"
  delegate_to: localhost
  become: no
  no_log: true
  changed_when: false
  register: _bcrypt_hash_result
  when: _existing_bcrypt is not defined
  tags: ['backrest', 'secrets']

- name: Set credential variables
  set_fact:
    backrest_restic_password: "{{ backrest_restic_password_result.field.value }}"
    backrest_web_password_bcrypt: "{{ _existing_bcrypt | default(_bcrypt_hash_result.stdout) }}"
  no_log: true
  tags: ['backrest', 'secrets']

# ------------------------------------------------------------------------------
# Deploy Backrest Stack
# ------------------------------------------------------------------------------

- name: Create Backrest compose directory
  file:
    path: "{{ backrest_compose_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0750'
  tags: ['backrest', 'deploy']

- name: Create Backrest data directory
  file:
    path: "{{ backrest_data_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0750'
  tags: ['backrest', 'deploy']

- name: Create Backrest config directory
  file:
    path: "{{ backrest_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0750'
  tags: ['backrest', 'deploy']

- name: Create Backrest cache directory
  file:
    path: "{{ backrest_cache_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0750'
  tags: ['backrest', 'deploy']

- name: Template Docker Compose file
  template:
    src: docker-compose.yml.j2
    dest: "{{ backrest_compose_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: '0640'
  notify: restart backrest
  tags: ['backrest', 'deploy']

- name: Template environment file
  template:
    src: .env.j2
    dest: "{{ backrest_compose_dir }}/.env"
    owner: root
    group: root
    mode: '0600'
  no_log: true
  notify: restart backrest
  tags: ['backrest', 'deploy']

- name: Template nginx configuration
  template:
    src: nginx.conf.j2
    dest: "{{ backrest_compose_dir }}/nginx.conf"
    owner: root
    group: root
    mode: '0644'
  notify: restart backrest
  tags: ['backrest', 'deploy']

- name: Template Backrest config.json
  template:
    src: config.json.j2
    dest: "{{ backrest_config_dir }}/config.json"
    owner: root
    group: root
    mode: '0600'
  no_log: true
  notify: restart backrest
  tags: ['backrest', 'deploy']

- name: Restart containers if configuration changed
  meta: flush_handlers

- name: Start Backrest containers
  community.docker.docker_compose_v2:
    project_src: "{{ backrest_compose_dir }}"
    state: present
    pull: missing
  tags: ['backrest', 'deploy']

- name: Wait for Backrest to be ready
  uri:
    url: "https://localhost:{{ backrest_https_port }}"
    validate_certs: no
    status_code: [200, 302]
  register: backrest_health
  retries: 30
  delay: 5
  until: backrest_health is succeeded
  tags: ['backrest', 'verify']

- name: Display Backrest deployment status
  debug:
    msg:
      - "========================================"
      - "Backrest deployment complete!"
      - "========================================"
      - "URL: https://{{ ansible_host }}:{{ backrest_https_port }}"
      - "Auth: {{ backrest_auth_user }} (password in 1Password)"
      - "Config: Ansible-managed ({{ backrest_config_dir }}/config.json)"
      - "Backup destination: {{ backrest_repo_path }} (NFS to UNAS Pro)"
      - "Sources directory: {{ backrest_sources_dir }} (NFS mount points)"
      - "SSH key: {{ backrest_ssh_dir }}/backrest_ed25519"
      - "Active plans: {{ backrest_plans | map(attribute='id') | list | join(', ') | default('none') }}"
      - "Source mounts: {{ backrest_source_mounts | map(attribute='name') | list | join(', ') | default('none') }}"
      - "========================================"
  tags: ['backrest']
