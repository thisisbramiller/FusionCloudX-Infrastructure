---
# ==============================================================================
# GitLab Role - Installation Tasks
# ==============================================================================

- name: Install GitLab prerequisites
  apt:
    name:
      - curl
      - ca-certificates
      - perl
      - openssh-server
      - postfix
      - tzdata
    state: present
    update_cache: yes

- name: Add GitLab GPG key
  apt_key:
    url: https://packages.gitlab.com/gitlab/gitlab-ce/gpgkey
    state: present

- name: Add GitLab repository
  apt_repository:
    repo: "deb https://packages.gitlab.com/gitlab/gitlab-ce/ubuntu/ {{ ansible_distribution_release }} main"
    state: present
    filename: gitlab-ce

# Create gitlab.rb BEFORE installing package to disable Let's Encrypt
# GitLab post-install script reads existing gitlab.rb if present
- name: Create GitLab configuration directory
  file:
    path: /etc/gitlab
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Create initial gitlab.rb with Let's Encrypt disabled
  copy:
    content: |
      # Initial GitLab configuration - prevents Let's Encrypt during install
      # Full configuration will be deployed after installation
      external_url '{{ gitlab_external_url }}'
      letsencrypt['enable'] = false
    dest: /etc/gitlab/gitlab.rb
    owner: root
    group: root
    mode: '0600'
  when: not ansible_check_mode

# Fetch the root password from 1Password BEFORE installing GitLab, so it can be
# injected into GitLab's first `gitlab-ctl reconfigure` (triggered by the package
# post-install when EXTERNAL_URL is set). GitLab only honours a chosen root
# password via the GITLAB_ROOT_PASSWORD env var on the INITIAL reconfigure, when
# the root user is first created.
#
# NOTE: writing /etc/gitlab/initial_root_password does NOT set the password — that
# file is written *by* GitLab as informational output, not read by it. The prior
# file-copy approach was therefore a silent no-op: GitLab kept its own auto-generated
# password while the file (and operator) believed it was the 1Password value.
- name: Retrieve GitLab root password from 1Password
  onepassword.connect.field_info:
    item: "GitLab Root User"
    field: "password"
    vault: "{{ lookup('env', 'TF_VAR_onepassword_vault_id') }}"
    hostname: "{{ lookup('env', 'OP_CONNECT_HOST') }}"
    token: "{{ lookup('env', 'OP_CONNECT_TOKEN') }}"
  register: gitlab_password_result
  no_log: true
  tags: ['secrets']

- name: Install GitLab package (sets root password from 1Password on first reconfigure)
  apt:
    name: "{{ gitlab_edition }}{{ '=' + gitlab_version if gitlab_version else '' }}"
    state: present
    update_cache: yes
  environment:
    DEBIAN_FRONTEND: noninteractive
    EXTERNAL_URL: "{{ gitlab_external_url }}"
    # GITLAB_ROOT_PASSWORD is consumed by the post-install `gitlab-ctl reconfigure`
    # to seed the root user's password on first init (fresh installs only).
    GITLAB_ROOT_PASSWORD: "{{ gitlab_password_result.field.value }}"
  register: gitlab_install_result
  no_log: true # task env carries the root password secret
  notify: reconfigure gitlab
