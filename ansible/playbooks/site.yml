---
# ==============================================================================
# Site Playbook - FusionCloudX Infrastructure
# ==============================================================================
# Main playbook that orchestrates all infrastructure configuration
# ==============================================================================

- name: FusionCloudX Infrastructure - Complete Deployment
  hosts: all
  gather_facts: yes

  tasks:
    - name: Display infrastructure overview
      debug:
        msg:
          - "========================================"
          - "FusionCloudX Infrastructure Deployment"
          - "========================================"
          - "Total hosts: {{ groups['all'] | length }}"
          - "PostgreSQL servers: {{ groups['postgresql'] | length if 'postgresql' in groups else 0 }}"
          - "Control Plane servers: {{ groups['control_plane'] | length if 'control_plane' in groups else 0 }}"
          - "Semaphore UI: {{ groups['semaphore'] | length if 'semaphore' in groups else 0 }}"
          - "GitLab: {{ groups['gitlab'] | length if 'gitlab' in groups else 0 }}"
          - "========================================"
      run_once: yes
      tags: ['always']

# ==============================================================================
# Database Server
# ==============================================================================

- name: Deploy PostgreSQL Database Server
  import_playbook: postgresql.yml
  tags: ['postgresql', 'databases']

# ==============================================================================
# Control Plane - GitLab
# ==============================================================================

- name: Deploy GitLab
  import_playbook: gitlab.yml
  tags: ['gitlab', 'control-plane']

# ==============================================================================
# Control Plane - Semaphore (runs separately via bootstrap)
# ==============================================================================

# Note: Semaphore bootstrap runs separately via bootstrap-semaphore.yml
# This playbook imports postgresql.yml and gitlab.yml for application server setup

