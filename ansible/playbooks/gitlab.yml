---
# ==============================================================================
# GitLab Deployment Playbook
# ==============================================================================
# Deploys and configures GitLab with external PostgreSQL database
# GitLab runs as a development platform and CI/CD system
# ==============================================================================

- name: Deploy GitLab
  hosts: gitlab
  become: yes
  gather_facts: yes

  pre_tasks:
    - name: Display target host
      debug:
        msg: "Deploying GitLab to {{ inventory_hostname }} ({{ ansible_host }})"
      tags: ['always']

    - name: Verify 1Password Connect authentication
      debug:
        msg: "Checking 1Password Connect authentication (OP_CONNECT_HOST and OP_CONNECT_TOKEN) or Service Account (OP_SERVICE_ACCOUNT_TOKEN)"
      tags: ['always']

    - name: Check 1Password environment variables
      debug:
        msg: "{{ 'Using 1Password Connect Server' if lookup('env', 'OP_CONNECT_HOST') else ('Using 1Password Service Account' if lookup('env', 'OP_SERVICE_ACCOUNT_TOKEN') else 'WARNING: No 1Password authentication found - set OP_CONNECT_HOST + OP_CONNECT_TOKEN or OP_SERVICE_ACCOUNT_TOKEN') }}"
      tags: ['always']

    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
      tags: ['always']

    - name: Set timezone
      timezone:
        name: "{{ timezone | default('America/Chicago') }}"
      tags: ['always']

  roles:
    - role: gitlab
      tags: ['gitlab']

  post_tasks:
    - name: Verify QEMU guest agent is running
      systemd:
        name: qemu-guest-agent
        state: started
      register: qemu_agent_status
      tags: ['verify']

    - name: Wait for GitLab to be fully initialized
      wait_for:
        port: 80
        host: localhost
        timeout: 600
        delay: 30
      tags: ['verify']

    - name: Test GitLab API connectivity
      uri:
        url: "{{ gitlab_external_url }}/api/v4/version"
        method: GET
        validate_certs: no
      register: gitlab_version_response
      retries: 3
      delay: 10
      until: gitlab_version_response.status == 200
      tags: ['verify']

    - name: Display GitLab version
      debug:
        msg: "GitLab version: {{ gitlab_version_response.json.version }}"
      tags: ['verify']

    - name: Display deployment summary
      debug:
        msg:
          - "========================================"
          - "GitLab Deployment Complete!"
          - "========================================"
          - "Hostname: {{ inventory_hostname }}"
          - "External URL: {{ gitlab_external_url }}"
          - "Database: {{ gitlab_postgresql_database }} on {{ gitlab_postgresql_host }}"
          - "Database User: {{ gitlab_postgresql_username }}"
          - "GitLab Runner: {{ 'Enabled' if gitlab_runner_enabled else 'Disabled' }}"
          - "========================================"
          - "Next Steps:"
          - "1. Access GitLab at: {{ gitlab_external_url }}"
          - "2. Login with default credentials (first run setup)"
          - "3. Configure GitLab settings and admin account"
          - "4. Setup GitLab Runners if using CI/CD"
          - "========================================"
      tags: ['verify']
