---
# ==============================================================================
# Seed / rotate the OFF-SITE copy of opconnect's credentials (AWS Secrets Manager
# secret tmpx/onprem/opconnect-credentials). Spec D8.
# ==============================================================================
# RUN BY HAND on the operator workstation (macOS). One-time venv setup, then the run.
#   one-time:  cd ansible && uv venv .venv \
#              && uv pip install --python .venv/bin/python ansible-core boto3 botocore cryptography \
#              && .venv/bin/ansible-galaxy collection install amazon.aws community.aws community.crypto
#   per run:   1. unlock the 1Password desktop app (account-mode op)
#              2. aws sso login --sso-session fcx-sso        (FIDO)
#              3. from ansible/:
#                 OBJC_DISABLE_INITIALIZE_FORK_SAFETY=YES no_proxy='*' \
#                   .venv/bin/ansible-playbook -i 'localhost,' \
#                   -e "ansible_python_interpreter=$PWD/.venv/bin/python" \
#                   playbooks/opconnect_credentials.yml        # add -e force=true to force a rotation
#
# Why the env (validated 2026-06-13): the aws_secret lookup runs in the CONTROLLER, so
# boto3 must be in the venv ansible runs from; OBJC_DISABLE_INITIALIZE_FORK_SAFETY + no_proxy
# fix the macOS fork-safety worker crash on the in-process lookup; NO AWS_PROFILE (the role
# passes the SSO profile to sts_assume_role as a PARAM, else amazon.aws errors on profile+tokens).
#
# Idempotent + expiry-aware (see roles/opconnect_credentials/tasks/main.yml).
# NOT imported by site.yml (rare, human-gated, localhost-only, highest-privilege).
# NEVER run with -v/-vvv — verbose bypasses no_log and would leak the bundle.
- name: Seed/rotate opconnect off-site credentials
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - vars/opconnect-bundle.yml # shared AWS-bundle contract (name/region/role/profile)
  vars:
    force: false
  tasks:
    - name: Seed/rotate the off-site credentials bundle
      ansible.builtin.import_role:
        name: opconnect_credentials
