---
# ==============================================================================
# Seed / rotate the OFF-SITE copy of opconnect's credentials (AWS Secrets Manager
# secret tmpx/onprem/opconnect-credentials). Spec D8.
# ==============================================================================
# RUN BY HAND on the operator workstation:
#   1. unlock the 1Password desktop app (account-mode `op`)
#   2. aws sso login --sso-session fcx-sso          (FIDO)
#   3. cd ansible && ansible-playbook playbooks/opconnect_credentials.yml
#
#   ansible-playbook playbooks/opconnect_credentials.yml              # seed if absent / rotate if near expiry
#   ansible-playbook playbooks/opconnect_credentials.yml -e force=true  # force a rotation now
#
# Idempotent + expiry-aware (see roles/opconnect/tasks/seed.yml).
# NOT imported by site.yml (rare, human-gated, localhost-only, highest-privilege).
# NEVER run with -v/-vvv — verbose bypasses no_log and would leak the bundle.
- name: Seed/rotate opconnect off-site credentials
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    force: false
  tasks:
    - name: Seed/rotate the off-site credentials bundle
      ansible.builtin.import_role:
        name: opconnect
        tasks_from: seed
