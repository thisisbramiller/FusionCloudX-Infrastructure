---
# ==============================================================================
# opconnect Deployment Playbook
# ==============================================================================
# Deploys 1Password Connect (connect-api + connect-sync) on the opconnect VM via
# Docker Compose — the secrets-root bring-up.
#
# BOOTSTRAP AUTH PATHS (two valid paths, both design-approved):
#
#   PATH A — P4 cutover (the intended build path for this phase):
#     The new Connect (VM 1101) is bootstrapped via the EXISTING old Connect
#     (VM 100). OP_CONNECT_HOST + OP_CONNECT_TOKEN are set pointing to the old
#     Connect. The one item read via Connect is the Ansible SSH private key
#     (ssh-key-loader role). The 1password-credentials.json for the new server
#     must be staged on the target separately (generated out-of-band from a prior
#     `op connect server create` run). After P4.4 repoint, the new Connect takes
#     over as the sole secrets endpoint.
#       export OP_CONNECT_HOST=...
#       export OP_CONNECT_TOKEN=...
#       ansible-playbook playbooks/opconnect.yml
#
#   PATH B — from-scratch rebuild (no prior Connect available):
#     Use OP_SERVICE_ACCOUNT_TOKEN so the SA token sources the SSH key instead.
#     Requires the operator to restage 1password-credentials.json from the DR
#     document via `op connect server create` or a manual DR procedure.
#       export OP_SERVICE_ACCOUNT_TOKEN=...
#       ansible-playbook playbooks/opconnect.yml
#
# Requirements (either path):
#   - 1password-credentials.json staged on the opconnect VM
#     (opconnect_credentials_src) — generated via `op connect server create`
# ==============================================================================

# OLD CONNECT VM 100 MUST STAY UP DURING P4. The ssh-key-loader role reads the
# Ansible SSH private key via 1Password Connect (OP_CONNECT_HOST /
# OP_CONNECT_TOKEN). This is the deliberate, design-approved P4 build path: the
# new Connect (VM 1101) is bootstrapped via the existing old Connect — NOT a
# temporary hack. Keep the old Connect (VM 100) serving OP_CONNECT_HOST until
# the new opconnect is verified and the P4.4 repoint happens. After repoint the
# new Connect serves all consumers and the old VM 100 can be decommissioned.
- name: Load SSH Key from 1Password Connect
  hosts: localhost
  gather_facts: false
  connection: local

  roles:
    - role: ssh-key-loader
      tags: ['ssh-key', 'always']

- name: Deploy 1Password Connect
  hosts: opconnect
  become: yes
  gather_facts: yes
  vars:
    ansible_ssh_private_key_file: "/tmp/.ansible_ssh_key"

  pre_tasks:
    - name: Ensure a 1Password auth path is available (SA token OR Connect)
      ansible.builtin.fail:
        msg: >-
          Provide a 1Password auth path: either OP_SERVICE_ACCOUNT_TOKEN (pure
          secrets-root bootstrap) OR OP_CONNECT_HOST + OP_CONNECT_TOKEN (the P4
          cutover bootstraps the NEW Connect via the EXISTING old Connect — the
          one item read is the Ansible SSH key). A from-scratch rebuild (no prior
          Connect) uses OP_SERVICE_ACCOUNT_TOKEN or an operator `op signin` to
          restage 1password-credentials.json from the DR document.
      when: >-
        lookup('env', 'OP_SERVICE_ACCOUNT_TOKEN') == '' and
        (lookup('env', 'OP_CONNECT_HOST') == '' or lookup('env', 'OP_CONNECT_TOKEN') == '')

    - name: Display opconnect bootstrap auth status
      ansible.builtin.debug:
        msg: "Bootstrapping 1Password Connect via the Service Account token (SA-token auth path)."

  roles:
    - opconnect

- name: Cleanup SSH Key
  hosts: localhost
  gather_facts: false
  connection: local

  tasks:
    - name: Include ssh-key-loader cleanup tasks
      ansible.builtin.include_role:
        name: ssh-key-loader
        tasks_from: cleanup.yml
      tags: ['ssh-key', 'cleanup', 'always']
