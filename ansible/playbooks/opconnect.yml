---
# ==============================================================================
# opconnect Deployment Playbook (Direction A, #68)
# ==============================================================================
# Deploys 1Password Connect (connect-api + connect-sync) on the opconnect VM via
# Docker Compose — the secrets-root bring-up — then serves it over native TLS.
#
# BOOTSTRAP SECRET READS — from the AWS Secrets Manager bundle (Connect-independent):
#   Play 1 reads the dedicated SSH private key, and the Deploy play reads
#   credentials.json, from the bundle via amazon.aws.aws_secret on the controller
#   (assume-role into shared-services; SSO+FIDO at the workstation). NO `op` CLI, NO
#   dependency on a live Connect — opconnect BUILDS Connect, so it cannot read from
#   one. This resolves the chicken-and-egg: opconnect rebuilds from bare metal with
#   no live Connect anywhere on the network.
#
# TLS (native): Connect comes up on LOOPBACK HTTP; the TLS play then reads the server
# cert from opconnect's OWN local Connect, writes it on-box, and flips connect-api to
# native TLS (OP_TLS_*). The cert never crosses the wire; nothing plaintext is on the LAN.
#
# Requirements (operator workstation):
#   - aws sso login --sso-session fcx-sso  (FIDO)
#   - boto3/botocore + amazon.aws/community.aws/community.crypto in the venv
#   - the AWS bundle tmpx/onprem/opconnect-credentials seeded (opconnect_credentials.yml)
#   - run with the opconnect dynamic inventory: -i opconnect.inventory.yml (AWS_PROFILE=fcx-sso)
# NEVER run with -v/-vvv — verbose bypasses no_log.
# ==============================================================================

# Reads the dedicated Ansible SSH private key from the AWS bundle (Direction A, #68)
# via amazon.aws.aws_secret on the controller (SSO+FIDO at the workstation) — NOT via
# `op` and NOT via Connect. Connect-independent by design: opconnect BUILDS Connect,
# so its key cannot come from Connect; the rebuild needs no live Connect, old or new.
- name: Load SSH Key from the AWS bundle
  hosts: localhost
  gather_facts: false
  connection: local
  vars_files:
    - vars/opconnect-bundle.yml # opconnect_bundle_* (vars_files does NOT inherit across plays)
  vars:
    ssh_key_source: aws_bundle

  roles:
    - role: ssh-key-loader
      tags: ['ssh-key', 'always']

# (Direction A drops the pre-deploy `certificates` play: opconnect does NOT use the
# shared certificates role. It serves its own TLS via native Connect TLS, cert
# self-served on-box AFTER deploy — see the "Configure opconnect native TLS" play
# below + roles/opconnect/tasks/tls.yml. The apt-cache update folded into the Deploy
# play's pre_tasks.)
- name: Deploy 1Password Connect
  hosts: opconnect
  become: yes
  gather_facts: yes
  vars_files:
    - vars/opconnect-bundle.yml # opconnect_bundle_* — the deploy role reads creds.json from the bundle
  vars:
    ansible_ssh_private_key_file: "/tmp/.ansible_ssh_key"

  pre_tasks:
    # Folded in from the retired pre-deploy "Common Infrastructure" play (Direction A
    # drops the pre-deploy certificates run — TLS is self-served post-deploy, CR6b).
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600
      tags: ['always']

    - name: Display opconnect bootstrap mode
      ansible.builtin.debug:
        msg: >-
          Bootstrapping 1Password Connect (Direction A): SSH key + credentials.json
          read from the AWS bundle (amazon.aws.aws_secret, SSO+FIDO). No `op`, no live
          Connect dependency. TLS is self-served on-box in the next play.

  roles:
    - opconnect

# Native Connect TLS, cert self-served ON-BOX. Connect is up on loopback HTTP; read
# the server cert from opconnect's OWN local Connect, write it on the box, flip
# connect-api to OP_TLS_*. Must sit BETWEEN Deploy and Cleanup (the TLS read needs
# /tmp/.ansible_ssh_key, which the Cleanup play shreds).
- name: Configure opconnect native TLS (cert self-served on-box)
  hosts: opconnect
  become: yes
  gather_facts: yes
  vars_files:
    - vars/opconnect-bundle.yml # opconnect_bundle_*
  vars:
    ansible_ssh_private_key_file: "/tmp/.ansible_ssh_key"

  pre_tasks:
    - name: Assume shared-services for the bundle (Connect token)
      amazon.aws.sts_assume_role:
        role_arn: "{{ opconnect_bundle_assume_role_arn }}"
        role_session_name: "opconnect-tls-token"
        region: "{{ opconnect_bundle_region }}"
        profile: "{{ opconnect_bundle_sso_profile }}"
      delegate_to: localhost
      become: false
      run_once: true
      register: _tls_assumed
      no_log: true

    - name: Read the Connect token from the AWS bundle
      ansible.builtin.set_fact:
        opconnect_tls_connect_token: >-
          {{ (lookup('amazon.aws.aws_secret', opconnect_bundle_secret_name,
                region=opconnect_bundle_region,
                access_key=_tls_assumed.sts_creds.access_key,
                secret_key=_tls_assumed.sts_creds.secret_key,
                session_token=_tls_assumed.sts_creds.session_token)
              | from_json).connect_token }}
      delegate_to: localhost
      become: false
      run_once: true
      no_log: true

  tasks:
    - name: Include opconnect TLS tasks (native Connect TLS, on-box)
      ansible.builtin.include_role:
        name: opconnect
        tasks_from: tls.yml

- name: Cleanup SSH Key
  hosts: localhost
  gather_facts: false
  connection: local

  tasks:
    - name: Include ssh-key-loader cleanup tasks
      ansible.builtin.include_role:
        name: ssh-key-loader
        tasks_from: cleanup.yml
      tags: ['ssh-key', 'cleanup', 'always']
