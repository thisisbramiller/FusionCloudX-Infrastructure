---
# ==============================================================================
# opconnect Deployment Playbook
# ==============================================================================
# Deploys 1Password Connect (connect-api + connect-sync) on the opconnect VM via
# Docker Compose — the secrets-root bring-up.
#
# BOOTSTRAP SECRET READS — 1Password DIRECT via the `op` CLI (Connect-independent):
#
#   Both bring-up plays set `op_use_cli: true`, so the ssh-key-loader and
#   certificates roles read their bootstrap secrets (the Ansible SSH key + the 4
#   TLS cert files) straight from 1Password via the `op` CLI — NOT from any Connect
#   server. OP_CONNECT_* are explicitly unset for those `op` calls (`env -u`), so
#   the read path never depends on the very Connect this play is (re)building. THIS
#   is the resolution to the chicken-and-egg: opconnect can be destroyed and rebuilt
#   from bare metal with no live Connect anywhere on the network.
#
#   `op` auth for those reads is sourced (in order) from: an OP_SERVICE_ACCOUNT_TOKEN
#   in the environment, or an operator 1Password desktop / `op signin` session.
#       export OP_SERVICE_ACCOUNT_TOKEN=...   # or: op signin / 1Password desktop
#       ansible-playbook playbooks/opconnect.yml
#
# Requirements:
#   - `op` CLI on the ANSIBLE CONTROLLER, authed (SA token OR desktop / `op signin`)
#   - TF_VAR_onepassword_vault_id set (ssh-key-loader op:// path; asserted below)
#   - The 1Password creds item `opconnect Connect Credentials` (vault FusionCloudX)
#     seeded by the opconnect_credentials role — the opconnect deploy role reads
#     the b64 credentials_json field from it via account-mode `op` and decodes it
#     onto the VM (no controller-side file, no manual scp). Generated via
#     `op connect server create` inside the seed playbook.
#
# The Deploy play's pre-flight assertion accepts OP_SERVICE_ACCOUNT_TOKEN OR
# OP_CONNECT_* purely as a coarse "a 1Password auth path is present" gate — the
# actual reads use `op` (desktop/SA). The new Connect serves all consumers once up.
# ==============================================================================

# Reads the Ansible SSH private key from 1Password via the `op` CLI (op_use_cli:
# true), authed by the controller's SA token / desktop session — NOT via a Connect
# server (OP_CONNECT_* are unset for the `op` call). Connect-independent by design:
# the rebuild needs no live Connect, old or new.
- name: Load SSH Key from 1Password (op CLI)
  hosts: localhost
  gather_facts: false
  connection: local
  vars:
    op_use_cli: true
    # dedicated native SSH-Key item (D9); hardcoded item title must match
    # opconnect_creds_1p_ssh_item in the opconnect_credentials role.
    op_ssh_key_ref: "op://{{ lookup('env','TF_VAR_onepassword_vault_id') }}/opconnect Bootstrap SSH Key/private key?ssh-format=openssh"

  pre_tasks:
    # G4 guard: an unset vault id makes the op:// path "op:///Item/..." and `op`
    # fails with a cryptic parse error rather than a clear "vault id missing".
    - name: Assert TF_VAR_onepassword_vault_id is set
      ansible.builtin.assert:
        that:
          - "lookup('env', 'TF_VAR_onepassword_vault_id') | length > 0"
        fail_msg: >-
          TF_VAR_onepassword_vault_id is empty. Export it (the FusionCloudX vault
          UUID) before running the opconnect bootstrap — the ssh-key-loader op://
          read needs it.
        quiet: true
      tags: ['ssh-key', 'always']

  roles:
    - role: ssh-key-loader
      tags: ['ssh-key', 'always']

# Common bootstrap — same baseline every fleet VM gets via site.yml's
# "Common Infrastructure Configuration" (apt cache + the certificates role:
# FusionCloudX CA trust + server cert). opconnect lives in its own state/inventory,
# so site.yml does not reach it — this play wires opconnect into the identical
# bootstrap so it is a fully-managed VM, not a special case. Unlike the fleet
# (which reads certs via Connect), this play sets op_use_cli: true so the certs are
# read from 1Password via the `op` CLI — keeping the bring-up Connect-independent.
- name: Common Infrastructure Configuration (opconnect)
  hosts: opconnect
  become: yes
  gather_facts: yes
  vars:
    ansible_ssh_private_key_file: "/tmp/.ansible_ssh_key"
    op_use_cli: true
  tags: ['common', 'certificates']

  pre_tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600
      tags: ['always']

  roles:
    # Do NOT pass certificates_* role-params here (they would shadow the role's
    # in-playbook Connect retrieval and require a manual /tmp/*.pem file).
    - role: certificates
      tags: ['certificates']

- name: Deploy 1Password Connect
  hosts: opconnect
  become: yes
  gather_facts: yes
  vars:
    ansible_ssh_private_key_file: "/tmp/.ansible_ssh_key"
    # The whole opconnect bootstrap is the op-CLI path (matches plays 1 & 2). Set
    # here too so the auth-gate `not op_use_cli` guard + the status debug evaluate
    # correctly in this play — the opconnect role itself does not branch on it.
    op_use_cli: true

  pre_tasks:
    # Under op_use_cli: true (the opconnect default) the SSH key + certs were ALREADY
    # read via `op` in the ssh-key-loader + certificates plays above, so op auth
    # (1Password desktop / `op signin` / SA token) is proven by the time we reach
    # this play — no further gate. The check below therefore applies ONLY to the
    # legacy Connect read path (op_use_cli: false), which needs OP_CONNECT_*. Without
    # the `not op_use_cli` guard this gate would falsely reject the documented
    # desktop / `op signin` happy path (no OP_CONNECT_*, no SA token).
    - name: Ensure a 1Password auth path is available (Connect read path)
      ansible.builtin.fail:
        msg: >-
          No 1Password auth path for the Connect read path (op_use_cli: false): set
          OP_CONNECT_HOST + OP_CONNECT_TOKEN (or OP_SERVICE_ACCOUNT_TOKEN). The op-CLI
          bootstrap (op_use_cli: true, opconnect default) instead uses an authenticated
          `op` session — 1Password desktop / `op signin` / SA token — already validated
          by the SSH-key + certificate plays above.
      when: >-
        not (op_use_cli | default(false) | bool) and
        lookup('env', 'OP_SERVICE_ACCOUNT_TOKEN') == '' and
        (lookup('env', 'OP_CONNECT_HOST') == '' or lookup('env', 'OP_CONNECT_TOKEN') == '')

    - name: Display opconnect bootstrap auth status
      ansible.builtin.debug:
        msg: >-
          {% if op_use_cli | default(false) | bool -%}
          Bootstrapping 1Password Connect via the `op` CLI (op_use_cli: true) — secrets read
          straight from 1Password (desktop / `op signin` / SA token); OP_CONNECT_* unset for
          the op subprocess. Connect-independent rebuild.
          {%- elif lookup('env', 'OP_SERVICE_ACCOUNT_TOKEN') != '' -%}
          Bootstrapping 1Password Connect via the Service Account token (Connect read path).
          {%- else -%}
          Bootstrapping 1Password Connect via 1Password Connect at {{ lookup('env', 'OP_CONNECT_HOST') }} (Connect read path).
          {%- endif %}

  roles:
    - opconnect

- name: Cleanup SSH Key
  hosts: localhost
  gather_facts: false
  connection: local

  tasks:
    - name: Include ssh-key-loader cleanup tasks
      ansible.builtin.include_role:
        name: ssh-key-loader
        tasks_from: cleanup.yml
      tags: ['ssh-key', 'cleanup', 'always']
