---
# ==============================================================================
# Ansible Collections Requirements
# ==============================================================================
# Install with: ansible-galaxy collection install -r requirements.yml
# ==============================================================================

collections:
  # Official 1Password Connect collection for secret management
  # Docs: https://developer.1password.com/docs/connect/ansible-collection
  # GitHub: https://github.com/1Password/ansible-onepasswordconnect-collection
  - name: onepassword.connect
    version: ">=2.3.1"

  # Official Ansible collection for PostgreSQL management
  # Docs: https://docs.ansible.com/ansible/latest/collections/community/postgresql/index.html
  - name: community.postgresql
    version: ">=3.0.0"

  # alvistack.gitlab - Comprehensive GitLab installation and configuration
  # Docs: https://github.com/alvistack/ansible-collection-gitlab
  # Includes roles for Omnibus installation, configuration, and management
  - name: alvistack.gitlab
    version: ">=1.0.0"
