---
# ==============================================================================
# Ansible Collections Requirements
# ==============================================================================
# Install with: ansible-galaxy collection install -r requirements.yml
# ==============================================================================

collections:
  # Official 1Password Connect collection for secret management
  # Docs: https://developer.1password.com/docs/connect/ansible-collection
  # GitHub: https://github.com/1Password/ansible-onepasswordconnect-collection
  - name: onepassword.connect
    version: ">=2.3.0"

  # Community General collection (for ufw module and other utilities)
  - name: community.general

  # AWS — sts_assume_role + the aws_secret / ssm_parameter lookups (opconnect bundle
  # seed + Direction-A consumer reads). #68 Phase C.
  - name: amazon.aws
  - name: community.aws

  # openssh_keypair — the opconnect_credentials seed generates the dedicated key locally.
  - name: community.crypto

  # docker_compose_v2 / docker_image (opconnect deploy + handler + the docker role).
  - name: community.docker

  # cloud.terraform dynamic inventory (opconnect.inventory.yml — the consumer runner).
  - name: cloud.terraform
